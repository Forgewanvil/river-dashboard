var days = DDATA.map(function(r){
  return {date:r.date,label:r.date.slice(5),o:r.o,h:r.h,l:r.l,c:r.c,
    bull:r.c>=r.o,pct:(r.c-r.o)/r.o*100,range:r.h-r.l};
});

var hcandles = HDATA.map(function(r){
  return {dt:r.dt,day:r.day,hr:r.hr,o:r.o,h:r.h,l:r.l,c:r.c,
    bull:r.c>=r.o,pct:(r.c-r.o)/r.o*100,range:r.h-r.l};
});

var byHour=[];
for(var i=0;i<24;i++){
  var hc=hcandles.filter(function(c){return c.hr===i;});
  var bulls=hc.filter(function(c){return c.bull;}).length;
  byHour.push({hr:i,n:hc.length,
    avgPct:hc.length?hc.reduce(function(s,c){return s+c.pct;},0)/hc.length:0,
    avgRange:hc.length?hc.reduce(function(s,c){return s+c.range;},0)/hc.length:0,
    winRate:hc.length?bulls/hc.length*100:0,bulls:bulls,bears:hc.length-bulls});
}

var BULL='rgba(29,158,117,0.88)',BEAR='rgba(216,90,48,0.88)',LINE='#4fa3e0';
var dchart=null,hchart=null;

function mx(ds,f){return Math.max.apply(null,ds.map(f));}
function mn(ds,f){return Math.min.apply(null,ds.map(f));}

// ---- DAILY STATS ----
function dBuildStats(ds){
  var big=ds.reduce(function(a,b){return Math.abs(b.pct)>Math.abs(a.pct)?b:a;});
  var bigR=ds.reduce(function(a,b){return b.range>a.range?b:a;});
  var bulls=ds.filter(function(d){return d.bull;}).length;
  document.getElementById('dsts').innerHTML=
    '<div class="sc"><div class="sl">Period high</div><div class="sv">$'+mx(ds,function(d){return d.h;}).toFixed(2)+'</div></div>'+
    '<div class="sc"><div class="sl">Period low</div><div class="sv">$'+mn(ds,function(d){return d.l;}).toFixed(2)+'</div></div>'+
    '<div class="sc"><div class="sl">Bull days</div><div class="sv g">'+bulls+'</div></div>'+
    '<div class="sc"><div class="sl">Bear days</div><div class="sv r">'+(ds.length-bulls)+'</div></div>'+
    '<div class="sc"><div class="sl">Biggest move</div><div class="sv '+(big.pct>0?'g':'r')+'">'+(big.pct>0?'+':'')+big.pct.toFixed(1)+'%<small>'+big.date+'</small></div></div>'+
    '<div class="sc"><div class="sl">Widest range</div><div class="sv">$'+bigR.range.toFixed(2)+'<small>'+bigR.date+'</small></div></div>';
}

function dReset(h){
  if(dchart){dchart.destroy();dchart=null;}
  var w=document.getElementById('dcwrap');
  w.style.height=(h||300)+'px';
  w.innerHTML='<canvas id="dcv" role="img" aria-label="RIVER daily chart"></canvas>';
  document.getElementById('dleg').innerHTML='';
  document.getElementById('dnote').textContent='';
}

function rangeChart(ds){
  dReset(300);
  dchart=new Chart(document.getElementById('dcv'),{type:'bar',
    data:{labels:ds.map(function(d){return d.label;}),datasets:[
      {data:ds.map(function(d){return +d.l.toFixed(3);}),backgroundColor:'rgba(0,0,0,0)',borderColor:'rgba(0,0,0,0)',stack:'s'},
      {data:ds.map(function(d){return +(d.h-d.l).toFixed(3);}),backgroundColor:ds.map(function(d){return d.bull?BULL:BEAR;}),borderRadius:2,stack:'s'},
      {data:ds.map(function(d){return +d.c.toFixed(3);}),type:'line',borderColor:LINE,borderWidth:1.5,pointRadius:0,tension:0.2,yAxisID:'y'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{
        title:function(i){return[ds[i[0].dataIndex].date];},
        label:function(i){var d=ds[i.dataIndex];return['O:$'+d.o.toFixed(3),'H:$'+d.h.toFixed(3),'L:$'+d.l.toFixed(3),'C:$'+d.c.toFixed(3),(d.pct>0?'+':'')+d.pct.toFixed(2)+'%'];},
        filter:function(i){return i.datasetIndex===1;}
      }}
    },
    scales:{
      x:{stacked:true,ticks:{color:'#555',font:{size:9},maxRotation:45,autoSkip:true,maxTicksLimit:20},grid:{color:'#1a1a1a'}},
      y:{stacked:false,ticks:{callback:function(v){return'$'+v.toFixed(1);},color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}}
    }
  }});
  document.getElementById('dleg').innerHTML='<span><span class="lsq" style="background:'+BULL+'"></span>Bull</span><span><span class="lsq" style="background:'+BEAR+'"></span>Bear</span><span><span style="display:inline-block;width:16px;height:2px;background:'+LINE+';vertical-align:middle;margin-right:4px;"></span>Close</span>';
}

function moveChart(ds){
  var sorted=[].concat(ds).sort(function(a,b){return Math.abs(b.pct)-Math.abs(a.pct);}).slice(0,30);
  dReset(Math.max(380,sorted.length*34+80));
  dchart=new Chart(document.getElementById('dcv'),{type:'bar',indexAxis:'y',
    data:{labels:sorted.map(function(d){return d.date;}),datasets:[{data:sorted.map(function(d){return +d.pct.toFixed(2);}),backgroundColor:sorted.map(function(d){return d.bull?BULL:BEAR;}),borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){var d=sorted[i.dataIndex];return(d.pct>0?'+':'')+d.pct.toFixed(2)+'%  H:$'+d.h.toFixed(2)+'  L:$'+d.l.toFixed(2);}}}},
    scales:{x:{ticks:{callback:function(v){return v+'%';},color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}},y:{ticks:{color:'#aaa',font:{size:10}},grid:{display:false}}}
  }});
}

function monthChart(ds,label){
  rangeChart(ds);
  var big=ds.reduce(function(a,b){return Math.abs(b.pct)>Math.abs(a.pct)?b:a;});
  var bigR=ds.reduce(function(a,b){return b.range>a.range?b:a;});
  document.getElementById('dnote').textContent=label+' — Bull:'+ds.filter(function(d){return d.bull;}).length+' Bear:'+ds.filter(function(d){return !d.bull;}).length+' | Biggest move: '+big.date+' ('+(big.pct>0?'+':'')+big.pct.toFixed(2)+'%) | Widest range: '+bigR.date+' ($'+bigR.range.toFixed(2)+') | High: $'+mx(ds,function(d){return d.h;}).toFixed(3)+' Low: $'+mn(ds,function(d){return d.l;}).toFixed(3);
}

function dsv(view,btn){
  document.querySelectorAll('#dtabs .tb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
  var feb=days.filter(function(d){return d.date.indexOf('2026-02')===0;});
  var mar=days.filter(function(d){return d.date.indexOf('2026-03')===0;});
  var apr=days.filter(function(d){return d.date.indexOf('2026-04')===0;});
  if(view==='range'){dBuildStats(days);rangeChart(days);}
  else if(view==='move'){dBuildStats(days);moveChart(days);}
  else if(view==='feb'){dBuildStats(feb);monthChart(feb,'February');}
  else if(view==='mar'){dBuildStats(mar);monthChart(mar,'March');}
  else if(view==='apr'){dBuildStats(apr);monthChart(apr,'April');}
}

// ---- HOURLY STATS ----
function hBuildStats(){
  var topBull=byHour.reduce(function(a,b){return b.avgPct>a.avgPct?b:a;});
  var topBear=byHour.reduce(function(a,b){return b.avgPct<a.avgPct?b:a;});
  var topVol=byHour.reduce(function(a,b){return b.avgRange>a.avgRange?b:a;});
  var topWin=byHour.reduce(function(a,b){return b.winRate>a.winRate?b:a;});
  document.getElementById('hsts').innerHTML=
    '<div class="sc"><div class="sl">Most bullish hour</div><div class="sv g">'+topBull.hr+':00<small>avg +'+(topBull.avgPct).toFixed(2)+'%</small></div></div>'+
    '<div class="sc"><div class="sl">Most bearish hour</div><div class="sv r">'+topBear.hr+':00<small>avg '+(topBear.avgPct).toFixed(2)+'%</small></div></div>'+
    '<div class="sc"><div class="sl">Highest win rate</div><div class="sv g">'+topWin.hr+':00<small>'+topWin.winRate.toFixed(0)+'% bull</small></div></div>'+
    '<div class="sc"><div class="sl">Most volatile hour</div><div class="sv">'+topVol.hr+':00<small>$'+(topVol.avgRange).toFixed(3)+' avg range</small></div></div>';
}

function hReset(h){
  if(hchart){hchart.destroy();hchart=null;}
  var w=document.getElementById('hcwrap');
  w.style.height=(h||300)+'px';w.style.display='block';
  w.innerHTML='<canvas id="hcv" role="img" aria-label="RIVER hourly chart"></canvas>';
  document.getElementById('hmwrap').style.display='none';
  document.getElementById('hleg').style.display='none';
  document.getElementById('hnote').textContent='';
}

function hsv(view,btn){
  document.querySelectorAll('#htabs .tb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
  var hrs=byHour.map(function(h){return h.hr+'h';});
  if(view==='avgpct'){
    hReset(300);
    var data=byHour.map(function(h){return +h.avgPct.toFixed(3);});
    hchart=new Chart(document.getElementById('hcv'),{type:'bar',data:{labels:hrs,datasets:[{data:data,backgroundColor:data.map(function(v){return v>0?BULL:BEAR;}),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){var h=byHour[i.dataIndex];return['Avg:'+(h.avgPct>0?'+':'')+h.avgPct.toFixed(2)+'%','Win:'+h.winRate.toFixed(0)+'%','n='+h.n];}}}},scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}},y:{ticks:{callback:function(v){return v.toFixed(1)+'%';},color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}}}}});
    document.getElementById('hnote').textContent='Avg % move per hour across all days loaded. Green=closes up on average, red=closes down.';
  } else if(view==='winrate'){
    hReset(300);
    var wr=byHour.map(function(h){return +h.winRate.toFixed(1);});
    hchart=new Chart(document.getElementById('hcv'),{type:'bar',data:{labels:hrs,datasets:[{data:wr,backgroundColor:wr.map(function(v){return v>=55?BULL:v<=45?BEAR:'rgba(100,100,100,0.5)';})}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){var h=byHour[i.dataIndex];return[h.bulls+' bull / '+h.bears+' bear','Win rate:'+h.winRate.toFixed(0)+'%'];}}}},scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}},y:{min:0,max:100,ticks:{callback:function(v){return v+'%';},color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}}}}});
    document.getElementById('hnote').textContent='Green >55% bull, red <45% bull, gray near 50/50.';
  } else if(view==='range'){
    hReset(300);
    var rng=byHour.map(function(h){return +h.avgRange.toFixed(4);});
    var rmx=Math.max.apply(null,rng);
    hchart=new Chart(document.getElementById('hcv'),{type:'bar',data:{labels:hrs,datasets:[{data:rng,backgroundColor:rng.map(function(v){var r=v/rmx;return r>0.7?'rgba(55,138,221,0.9)':r>0.4?'rgba(55,138,221,0.55)':'rgba(55,138,221,0.2)';})}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){return'Avg range:$'+byHour[i.dataIndex].avgRange.toFixed(3);}}}},scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}},y:{ticks:{callback:function(v){return'$'+v.toFixed(3);},color:'#555',font:{size:10}},grid:{color:'#1a1a1a'}}}}});
    document.getElementById('hnote').textContent='Darker blue = wider H/L range = more movement to scalp.';
  } else if(view==='heatmap'){
    if(hchart){hchart.destroy();hchart=null;}
    document.getElementById('hcwrap').style.display='none';
    document.getElementById('hleg').style.display='flex';
    var udays=[...new Set(hcandles.map(function(c){return c.day;}))] .sort();
    var html='<div class="hm-grid" style="grid-template-columns:50px repeat(24,1fr);">';
    html+='<div></div>';
    for(var h=0;h<24;h++) html+='<div style="font-size:9px;color:#444;text-align:center;padding:1px 0;">'+h+'h</div>';
    udays.forEach(function(day){
      html+='<div style="font-size:9px;color:#666;display:flex;align-items:center;white-space:nowrap;">'+day.slice(5)+'</div>';
      for(var h=0;h<24;h++){
        var c=hcandles.find(function(x){return x.day===day&&x.hr===h;});
        if(!c){html+='<div class="hm-cell" style="background:rgba(128,128,128,0.05);"></div>';return;}
        var p=c.pct,intensity=Math.min(Math.abs(p)/3,1),alpha=(0.12+intensity*0.78).toFixed(2);
        var col=p>0?'29,158,117':'216,90,48';
        html+='<div class="hm-cell" style="background:rgba('+col+','+alpha+');" title="'+day+' '+h+':00 '+(p>0?'+':'')+p.toFixed(2)+'%"></div>';
      }
    });
    html+='</div>';
    document.getElementById('hmwrap').innerHTML=html;
    document.getElementById('hmwrap').style.display='block';
    document.getElementById('hnote').textContent='Hover any cell for exact % move. Green=bull, red=bear, intensity=magnitude.';
  }
}

dBuildStats(days);
rangeChart(days);
hBuildStats();
hsv('avgpct', document.querySelector('#htabs .tb'));
</script>
</body>
</html>
